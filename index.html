<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KoCo - Korean Conversation Companion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header__branding">KoCo</div>
      <button id="unitSelectorBtn" class="header__unit-selector" type="button">
        <span id="headerUnitTitle" class="header__unit-title">음식과 영양</span>
        <span id="headerUnitSub" class="header__unit-sub">Food & Nutrition · 자유 대화</span>
        <span class="header__unit-chevron">▾</span>
      </button>
      <button id="endSessionBtn" class="header__end-session" title="Terminer la séance" type="button">⏹</button>
    </header>

    <div id="sessionSummaryModal" class="summary-modal hidden">
      <div class="summary-overlay"></div>
      <div class="summary-sheet">
        <div class="summary-handle"></div>
        <h2 class="summary-title">📊 Bilan de séance</h2>
        <div class="summary-stats">
          <div class="summary-stat">
            <span class="summary-stat__icon">⏱</span>
            <span class="summary-stat__value" id="summaryDuration">0 min</span>
            <span class="summary-stat__label">Temps de séance</span>
          </div>
          <div class="summary-stat">
            <span class="summary-stat__icon">💬</span>
            <span class="summary-stat__value" id="summaryMessages">0</span>
            <span class="summary-stat__label">Messages envoyés</span>
          </div>
          <div class="summary-stat">
            <span class="summary-stat__icon">🔧</span>
            <span class="summary-stat__value" id="summaryCorrections">0</span>
            <span class="summary-stat__label">Corrections reçues</span>
          </div>
        </div>
        <div class="summary-corrections" id="summaryCorrectionsDetail"></div>
        <div class="summary-gms" id="summaryGMS"></div>
        <div class="summary-actions">
          <button id="summaryNewSession" class="summary-btn summary-btn--primary" type="button">🔄 Nouvelle séance</button>
          <button id="summaryContinue" class="summary-btn summary-btn--secondary" type="button">✖ Fermer</button>
        </div>
      </div>
    </div>

    <div id="unitSelectorModal" class="unit-selector-modal hidden">
      <div class="unit-selector-overlay"></div>
      <div class="unit-selector-sheet">
        <div class="unit-selector-handle"></div>
        <h3 class="unit-selector-title">단원 선택</h3>
        <div class="unit-selector-list" id="unitSelectorList"></div>
      </div>
    </div>

    <main class="main main--with-tabs">
      <div class="conversation"></div>

      <div class="transcription-panel">
        <div class="transcription" aria-live="polite">말하기 대기...</div>
        <div class="transcription__indicator"></div>
      </div>

      <div class="fluency-bar">
        <div class="fluency-bar__fill" style="width: 25%;"></div>
      </div>
      <div class="fluency-badge fluency-badge--low">유창성: 짧음</div>

      <div class="typing-indicator" style="display:none;">
        <div class="typing-indicator__dot"></div>
        <div class="typing-indicator__dot"></div>
        <div class="typing-indicator__dot"></div>
      </div>

      <div class="alert-area"></div>

      <div class="mic-container">
        <button class="mic-button" type="button">
          <span class="mic-button__icon">🎙</span>
        </button>
        <div class="mic-status">마이크 시작</div>
      </div>

      <button class="next-question-btn" type="button" style="display:none;">다음 질문</button>
    </main>

    <nav class="nav-tabs">
      <button class="nav-tab active" data-mode="freeChat" type="button">
        <span class="nav-tab__icon">💬</span>
        <span class="nav-tab__label">자유 대화</span>
      </button>
      <button class="nav-tab" data-mode="debate" type="button">
        <span class="nav-tab__icon">⚖️</span>
        <span class="nav-tab__label">토론</span>
      </button>
    </nav>

    <div class="modal-overlay modal-overlay--hidden" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-label="Anthropic API 키 입력">
        <div class="modal__title">API 키 입력</div>
        <div class="modal__description">Claude Claude Sonnet 4 API 키를 입력해주세요. 이 키는 로컬에만 저장됩니다.</div>
        <div class="modal__warning">키가 없으면 대화 기능을 사용할 수 없습니다.</div>
        <input class="modal__input" type="text" placeholder="sk-ant-..." aria-label="API 키" />
        <div class="modal__buttons">
          <button class="modal__button modal__button--primary" type="button">저장</button>
          <button class="modal__button modal__button--secondary" type="button">취소</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="data.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
