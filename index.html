<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KoCo - Korean Conversation Companion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loginScreen" style="display:flex; align-items:center; justify-content:center; min-height:100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div style="background:white; padding:40px; border-radius:16px; text-align:center; max-width:340px; width:90%;">
      <h1 style="font-size:2rem; font-weight:700; margin-bottom:8px;">KoCo</h1>
      <p style="color:#666; margin-bottom:24px;">Korean Conversation Companion</p>
      <p style="margin-bottom:20px;">Google 계정으로 로그인하세요.</p>
      <button id="googleLoginButton" onclick="handleGoogleLogin()" style="display:flex; align-items:center; gap:12px; padding:12px 24px; border:1px solid #ddd; border-radius:8px; background:white; cursor:pointer; font-size:1rem; width:100%; justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google로 로그인
      </button>
      <p style="margin-top:16px; color:#666; font-size:0.85rem;">Google 계정으로 안전하게 로그인하세요.</p>
    </div>
  </div>
  <div id="app" style="display:none;">
    <header class="header">
      <div class="header__title">KoCo</div>
      <div class="header__unit"></div>
      <div class="header__mode"></div>
    </header>

    <main class="main main--with-tabs">
      <div class="conversation"></div>

      <div class="transcription-panel">
        <div class="transcription" aria-live="polite">말하기 대기...</div>
        <div class="transcription__indicator"></div>
      </div>

      <div class="fluency-bar">
        <div class="fluency-bar__fill" style="width: 25%;"></div>
      </div>
      <div class="fluency-badge fluency-badge--low">유창성: 짧음</div>

      <div class="typing-indicator" style="display:none;">
        <div class="typing-indicator__dot"></div>
        <div class="typing-indicator__dot"></div>
        <div class="typing-indicator__dot"></div>
      </div>

      <div class="alert-area"></div>

      <div class="mic-container">
        <button class="mic-button" type="button">
          <span class="mic-button__icon">🎙</span>
        </button>
        <div class="mic-status">마이크 시작</div>
      </div>

      <button class="next-question-btn" type="button" style="display:none;">다음 질문</button>
    </main>

    <nav class="nav-tabs">
      <button class="nav-tab active" data-mode="freeChat" type="button">
        <span class="nav-tab__icon">💬</span>
        <span class="nav-tab__label">자유 대화</span>
      </button>
      <button class="nav-tab" data-mode="debate" type="button">
        <span class="nav-tab__icon">⚖️</span>
        <span class="nav-tab__label">토론</span>
      </button>
      <button class="nav-tab" data-mode="speaking" type="button">
        <span class="nav-tab__icon">🗣️</span>
        <span class="nav-tab__label">말하기 시험</span>
      </button>
      <button class="nav-tab" data-mode="speedDrill" type="button">
        <span class="nav-tab__icon">⚡</span>
        <span class="nav-tab__label">속도 드릴</span>
      </button>
    </nav>

    <div class="modal-overlay modal-overlay--hidden" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-label="Anthropic API 키 입력">
        <div class="modal__title">API 키 입력</div>
        <div class="modal__description">Claude Claude Sonnet 4 API 키를 입력해주세요. 이 키는 로컬에만 저장됩니다.</div>
        <div class="modal__warning">키가 없으면 대화 기능을 사용할 수 없습니다.</div>
        <input class="modal__input" type="text" placeholder="sk-ant-..." aria-label="API 키" />
        <div class="modal__buttons">
          <button class="modal__button modal__button--primary" type="button">저장</button>
          <button class="modal__button modal__button--secondary" type="button">취소</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="data.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
