<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>" />
  <title>KoCo - Korean Conversation Companion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
      <div class="login-container">
        <div class="login-header">
          <h1 class="login-title">KoCo</h1>
          <p class="login-subtitle">Korean Conversation Companion</p>
        </div>

        <div class="login-form">
          <div class="login-description">
            Google 계정으로 로그인하세요.
          </div>

          <div class="login-google-container">
            <button type="button" class="login-google-button" id="googleLoginButton">
              <svg class="login-google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Google로 로그인
            </button>
          </div>

          <div id="loginMessage" class="login-message"></div>
        </div>

        <div class="login-footer">
          <p>Google 계정으로 안전하게 로그인하세요.</p>
        </div>
      </div>
    </div>

    <!-- MAIN APP CONTENT -->
    <div id="mainApp" style="display: none;">
      <div class="debug-panel__header">
        <span>🔧 Speech API Debug</span>
        <button class="debug-panel__close" onclick="toggleDebugPanel()">×</button>
      </div>
      <div class="debug-panel__content" id="debugContent"></div>
    </div>

    <!-- ═════════════════════════════════════════
         HEADER — Lesson Title + Mode + TTS Toggle
         ═════════════════════════════════════════ -->
    <header class="header">
      <div class="header__content">
        <div class="header__branding">KoCo</div>
        <div class="header__lesson-info">
          <div class="header__lesson-title" id="headerLessonTitle">KoCo</div>
          <div class="header__lesson-theme" id="headerLessonTheme"></div>
        </div>
      </div>
      <div class="header__actions">
        <span class="header__mode-badge" id="headerModeBadge"></span>
        <button class="header__optimize-btn header__optimize-btn--hidden" type="button" id="debateOptimizeBtn" aria-label="토론 최적화">
          ⚙️ 최적화
        </button>
        <button class="tts-toggle" type="button" aria-label="음성 합성">
          <span class="tts-toggle__icon">🔊</span>
        </button>
        <button class="logout-btn" type="button" id="logoutBtn" aria-label="로그아웃" style="display: none;">
          🚪
        </button>
      </div>
    </header>

    <!-- PROGRESS BAR — Visual feedback for lesson progress -->
    <div class="progress-bar">
      <div class="progress-bar__fill" id="progressBarFill"></div>
    </div>

    <!-- ═════════════════════════════════════════
         NAVIGATION DROPDOWN — SNU 5A Chapter/Lesson Selector
         ═════════════════════════════════════════ -->
    <section class="nav-dropdown-section" aria-label="단원 및 레슨 선택">
      <button class="nav-dropdown-toggle" id="navDropdownToggle" type="button" aria-haspopup="listbox" aria-expanded="false" aria-label="단원 선택">
        <span class="nav-dropdown-label" id="navDropdownLabel">1 건강한 삶</span>
        <span class="nav-dropdown-icon">▼</span>
      </button>
      
      <div class="nav-dropdown-menu" id="navDropdownMenu" role="listbox" style="display: none;">
        <!-- Chapters and lessons generated dynamically by app.js -->
      </div>
    </section>

    <!-- ═════════════════════════════════════════
         MAIN CONTENT AREA — Conversation + Input
         ═════════════════════════════════════════ -->
    <main class="main">

      <!-- Conversation Messages -->
      <div class="conversation"></div>

      <!-- Transcription Panel (voice recognition) -->
      <div class="transcription-panel">
        <div class="transcription" aria-live="polite">말하기 대기...</div>
        <div class="transcription__indicator"></div>
      </div>

      <!-- Fluency Indicator (hidden by default) -->
      <div class="fluency-badge fluency-badge--low" style="display: none;"><span id="fluencyText">유창성: 짧음</span></div>

      <!-- Typing Indicator (for assistant's response) -->
      <div class="typing-indicator" style="display:none;">
        <div class="typing-indicator__dot"></div>
        <div class="typing-indicator__dot"></div>
        <div class="typing-indicator__dot"></div>
      </div>

      <!-- Alert Messages (errors, success) -->
      <div class="alert-area"></div>

      <!-- INPUT CONTAINER — WhatsApp-style UI -->
      <div class="input-container">
        
        <!-- Combined Input Bar (always visible) -->
        <div class="input-bar">
          <!-- Mic Icon on the left -->
          <button class="input-bar__mic-btn" type="button" id="inputBarMicBtn" aria-label="음성 입력">
            <span class="input-bar__icon">🎤</span>
          </button>
          
          <!-- Text Input -->
          <textarea 
            class="input-bar__text" 
            id="inputBarText"
            placeholder="여기에 한국어로 입력하세요..." 
            rows="2" 
            maxlength="500"
            aria-label="텍스트 입력"></textarea>
          
          <!-- Send/Mic Button on the right (toggles based on text input) -->
          <button class="input-bar__action-btn" type="button" id="inputBarActionBtn" aria-label="메시지 전송">
          </button>
          
        </div>
        
        <!-- Transcription Panel (voice feedback) -->
        <div class="transcription-panel-inline">
          <div class="transcription-inline" aria-live="polite" id="transcriptionInline"></div>
        </div>

      </div>

      <!-- Next Question Button (visible in certain modes) -->
      <button class="next-question-btn" type="button" style="display:none;">다음 질문</button>

    </main>

    <!-- ═════════════════════════════════════════
         LEVEL 3 — MODE TABS (Fixed Bottom)
         ═════════════════════════════════════════ -->
    <nav class="nav-tabs" aria-label="학습 모드 선택">
      <button class="nav-tab active" data-mode="freeChat" type="button" aria-label="자유 대화 모드">
        <span class="nav-tab__icon">💬</span>
        <span class="nav-tab__label">자유 대화</span>
      </button>
      <button class="nav-tab" data-mode="debate" type="button" aria-label="토론 모드">
        <span class="nav-tab__icon">⚖️</span>
        <span class="nav-tab__label">토론</span>
      </button>
      <button class="nav-tab" data-mode="speedDrill" type="button" aria-label="속도 드릴 모드">
        <span class="nav-tab__icon">⚡</span>
        <span class="nav-tab__label">드릴</span>
      </button>
    </nav>

    <!-- API KEY MODAL —— Appears on first launch if no API key -->
    <div class="modal-overlay modal-overlay--hidden" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-label="Anthropic API 키 입력">
        <div class="modal__title">API 키 입력</div>
        <div class="modal__description">Claude Sonnet 4 API 키를 입력해주세요. 이 키는 로컬에만 저장됩니다.</div>
        <div class="modal__warning">키가 없으면 대화 기능을 사용할 수 없습니다.</div>
        <input class="modal__input" type="text" placeholder="sk-ant-..." aria-label="API 키" />
        <div class="modal__buttons">
          <button class="modal__button modal__button--primary" type="button">저장</button>
          <button class="modal__button modal__button--secondary" type="button">취소</button>
        </div>
      </div>
    </div>

    <!-- DEBATE OPTIMIZATION MODAL -->
    <div class="modal-overlay modal-overlay--hidden" id="debateOptimizeModal" aria-hidden="true">
      <div class="modal modal--small" role="dialog" aria-modal="true" aria-label="토론 최적화 설정">
        <div class="modal__title">토론 최적화</div>
        <div class="modal__description">토론 형식을 선택하면 코코가 처음부터 그 형식대로 진행합니다.</div>

        <div class="debate-optimize__options">
          <label class="debate-optimize__option">
            <input type="radio" name="debateFormat" value="proCon" checked />
            <div>
              <strong>Option A — 찬반 토론</strong>
              <p>주제에 대해 찬성 또는 반대 입장을 정하고 논리적으로 주장합니다.</p>
              <small>코코는 사용자의 입장과 반대되는 쪽을 취하고 반론합니다.</small>
            </div>
          </label>

          <label class="debate-optimize__option">
            <input type="radio" name="debateFormat" value="qa" />
            <div>
              <strong>Option B — 질문-답변</strong>
              <p>코코가 주제에 관한 질문을 하고 사용자가 답변합니다.</p>
              <small>코코는 구조화된 질문을 던지고 사용자의 답변을 이끌어냅니다.</small>
            </div>
          </label>

          <label class="debate-optimize__option">
            <input type="radio" name="debateFormat" value="presentation" />
            <div>
              <strong>Option C — 발표 연습</strong>
              <p>사용자가 주제에 대해 발표하고 코코가 피드백을 줍니다.</p>
              <small>사용자가 발표한 뒤 코코가 구조화된 피드백을 제공합니다.</small>
            </div>
          </label>
        </div>

        <div class="modal__buttons modal__buttons--wide">
          <button class="modal__button modal__button--primary" type="button" id="debateOptimizeStartBtn">시작</button>
          <button class="modal__button modal__button--secondary" type="button" id="debateOptimizeCancelBtn">취소</button>
        </div>
      </div>
    </div>

    </div> <!-- End of mainApp -->

  </div>

  <!-- Scripts (Order matters!) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="data.js"></script>
  <script type="module" src="api.js"></script>
  <script type="module" src="supabase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
